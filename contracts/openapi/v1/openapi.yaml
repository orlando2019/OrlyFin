openapi: 3.0.3
info:
  title: OrlyFin API
  version: 1.3.0
  description: API REST versionada para OrlyFin.
servers:
  - url: /api/v1
paths:
  /health:
    get:
      summary: Health check
      tags: [system]
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /auth/login:
    post:
      summary: Login with email and password
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      summary: Rotate tokens using refresh cookie
      tags: [auth]
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /auth/logout:
    post:
      summary: Logout and clear auth cookies
      tags: [auth]
      responses:
        '200':
          description: Session closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /auth/me:
    get:
      summary: Get authenticated user profile and permissions
      tags: [auth]
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users:
    post:
      summary: Create user in current organization
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /rbac/me/permissions:
    get:
      summary: List current user permission keys
      tags: [rbac]
      responses:
        '200':
          description: Permission list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionListResponse'

  /rbac/users/{user_id}/roles:
    post:
      summary: Assign roles to user
      tags: [rbac]
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRoleRequest'
      responses:
        '200':
          description: Roles assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignRoleResponse'

  /accounts:
    post:
      summary: Create financial account
      tags: [accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreateRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
    get:
      summary: List financial accounts
      tags: [accounts]
      responses:
        '200':
          description: Account list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountListResponse'

  /incomes:
    post:
      summary: Create income record
      tags: [income]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncomeCreateRequest'
      responses:
        '201':
          description: Income created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncomeResponse'
    get:
      summary: List income records
      tags: [income]
      responses:
        '200':
          description: Income list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncomeListResponse'

  /expenses:
    post:
      summary: Create expense record
      tags: [expense]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpenseCreateRequest'
      responses:
        '201':
          description: Expense created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseResponse'
    get:
      summary: List expense records
      tags: [expense]
      responses:
        '200':
          description: Expense list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseListResponse'

  /debts:
    post:
      summary: Create debt record
      tags: [debt]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DebtCreateRequest'
      responses:
        '201':
          description: Debt created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtResponse'
    get:
      summary: List debt records
      tags: [debt]
      responses:
        '200':
          description: Debt list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtListResponse'

  /payments:
    post:
      summary: Create payment record
      tags: [payment]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreateRequest'
      responses:
        '201':
          description: Payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
    get:
      summary: List payment records
      tags: [payment]
      responses:
        '200':
          description: Payment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentListResponse'

  /budgets:
    post:
      summary: Create budget
      tags: [budget]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetCreateRequest'
      responses:
        '201':
          description: Budget created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetResponse'
    get:
      summary: List budgets
      tags: [budget]
      responses:
        '200':
          description: Budget list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetListResponse'

  /dashboard/executive:
    get:
      summary: Executive dashboard summary
      tags: [dashboard]
      responses:
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutiveDashboardResponse'

  /reconciliations:
    post:
      summary: Create reconciliation for account period
      tags: [reconciliation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconciliationCreateRequest'
      responses:
        '201':
          description: Reconciliation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationResponse'
    get:
      summary: List reconciliations
      tags: [reconciliation]
      responses:
        '200':
          description: Reconciliation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationListResponse'

  /reconciliations/{reconciliation_id}/resolve:
    post:
      summary: Resolve reconciliation
      tags: [reconciliation]
      parameters:
        - in: path
          name: reconciliation_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconciliationResolveRequest'
      responses:
        '200':
          description: Reconciliation resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationResponse'

  /alerts/evaluate:
    post:
      summary: Evaluate alert rules and generate alerts
      tags: [alerts]
      responses:
        '200':
          description: Evaluation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluateAlertsResponse'

  /alerts:
    get:
      summary: List alerts
      tags: [alerts]
      responses:
        '200':
          description: Alert list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertListResponse'

  /alerts/{alert_id}/read:
    post:
      summary: Mark alert as read
      tags: [alerts]
      parameters:
        - in: path
          name: alert_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Alert updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponse'

  /audit/events:
    get:
      summary: List audit events
      tags: [audit]
      responses:
        '200':
          description: Audit events list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventListResponse'

  /attachments/upload:
    post:
      summary: Upload attachment
      tags: [attachments]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AttachmentUploadRequest'
      responses:
        '200':
          description: Attachment uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachmentResponse'

  /attachments:
    get:
      summary: List attachments
      tags: [attachments]
      responses:
        '200':
          description: Attachment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachmentListResponse'

  /attachments/{attachment_id}:
    delete:
      summary: Delete attachment
      tags: [attachments]
      parameters:
        - in: path
          name: attachment_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Attachment deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachmentResponse'

  /settings:
    post:
      summary: Upsert setting
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingUpsertRequest'
      responses:
        '200':
          description: Setting updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingResponse'
    get:
      summary: List settings
      tags: [settings]
      responses:
        '200':
          description: Settings list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingListResponse'

  /settings/{key}:
    get:
      summary: Get setting by key
      tags: [settings]
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Setting detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingResponse'

components:
  schemas:
    HealthResponse:
      type: object
      required: [status, service, version, timestamp]
      properties:
        status:
          type: string
        service:
          type: string
        version:
          type: string
        timestamp:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthUserResponse:
      type: object
      required: [id, organization_id, email, full_name, is_active, roles, permissions]
      properties:
        id:
          type: string
        organization_id:
          type: string
        email:
          type: string
        full_name:
          type: string
        is_active:
          type: boolean
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string

    MeResponse:
      type: object
      required: [id, organization_id, email, full_name, roles, permissions]
      properties:
        id:
          type: string
        organization_id:
          type: string
        email:
          type: string
        full_name:
          type: string
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string

    UserCreateRequest:
      type: object
      required: [email, full_name, password]
      properties:
        email:
          type: string
        full_name:
          type: string
        password:
          type: string
          minLength: 8
        role_names:
          type: array
          items:
            type: string

    AccountCreateRequest:
      type: object
      required: [name, account_type, currency_code]
      properties:
        name:
          type: string
        account_type:
          type: string
        currency_code:
          type: string
        initial_balance:
          type: number

    AccountResponse:
      type: object
      properties:
        id:
          type: string
        organization_id:
          type: string
        name:
          type: string
        account_type:
          type: string
        currency_code:
          type: string
        current_balance:
          type: number
        is_active:
          type: boolean

    AccountListResponse:
      type: object
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountResponse'

    IncomeCreateRequest:
      type: object
      required: [category, amount, occurred_on]
      properties:
        account_id:
          type: string
          nullable: true
        category:
          type: string
        description:
          type: string
        amount:
          type: number
        income_type:
          type: string
        frequency:
          type: string
          nullable: true
        occurred_on:
          type: string
          format: date

    IncomeResponse:
      type: object
      properties:
        id:
          type: string
        organization_id:
          type: string
        account_id:
          type: string
          nullable: true
        category:
          type: string
        description:
          type: string
        amount:
          type: number
        income_type:
          type: string
        frequency:
          type: string
          nullable: true
        occurred_on:
          type: string
          format: date

    IncomeListResponse:
      type: object
      properties:
        incomes:
          type: array
          items:
            $ref: '#/components/schemas/IncomeResponse'

    ExpenseCreateRequest:
      type: object
      required: [category, amount, occurred_on]
      properties:
        account_id:
          type: string
          nullable: true
        category:
          type: string
        description:
          type: string
        amount:
          type: number
        expense_type:
          type: string
        due_on:
          type: string
          format: date
          nullable: true
        occurred_on:
          type: string
          format: date

    ExpenseResponse:
      type: object
      properties:
        id:
          type: string
        organization_id:
          type: string
        account_id:
          type: string
          nullable: true
        category:
          type: string
        description:
          type: string
        amount:
          type: number
        expense_type:
          type: string
        due_on:
          type: string
          format: date
          nullable: true
        occurred_on:
          type: string
          format: date
        status:
          type: string

    ExpenseListResponse:
      type: object
      properties:
        expenses:
          type: array
          items:
            $ref: '#/components/schemas/ExpenseResponse'

    DebtCreateRequest:
      type: object
      required: [creditor, principal_amount, opened_on]
      properties:
        account_id:
          type: string
          nullable: true
        creditor:
          type: string
        description:
          type: string
        principal_amount:
          type: number
        debt_type:
          type: string
        total_installments:
          type: integer
          nullable: true
        opened_on:
          type: string
          format: date
        due_on:
          type: string
          format: date
          nullable: true

    DebtResponse:
      type: object
      properties:
        id:
          type: string
        organization_id:
          type: string
        account_id:
          type: string
          nullable: true
        creditor:
          type: string
        description:
          type: string
        principal_amount:
          type: number
        balance_amount:
          type: number
        debt_type:
          type: string
        total_installments:
          type: integer
          nullable: true
        paid_installments:
          type: integer
        opened_on:
          type: string
          format: date
        due_on:
          type: string
          format: date
          nullable: true
        status:
          type: string

    DebtListResponse:
      type: object
      properties:
        debts:
          type: array
          items:
            $ref: '#/components/schemas/DebtResponse'

    PaymentCreateRequest:
      type: object
      required: [account_id, amount, paid_on]
      properties:
        account_id:
          type: string
        payment_type:
          type: string
        amount:
          type: number
        paid_on:
          type: string
          format: date
        reference_type:
          type: string
          nullable: true
        reference_id:
          type: string
          nullable: true
        notes:
          type: string

    PaymentResponse:
      type: object
      properties:
        id:
          type: string
        organization_id:
          type: string
        account_id:
          type: string
        payment_type:
          type: string
        amount:
          type: number
        paid_on:
          type: string
          format: date
        reference_type:
          type: string
          nullable: true
        reference_id:
          type: string
          nullable: true
        notes:
          type: string

    PaymentListResponse:
      type: object
      properties:
        payments:
          type: array
          items:
            $ref: '#/components/schemas/PaymentResponse'

    BudgetCreateRequest:
      type: object
      required: [category, period_start, period_end, planned_amount]
      properties:
        category:
          type: string
        period_start:
          type: string
          format: date
        period_end:
          type: string
          format: date
        planned_amount:
          type: number
        alert_threshold_percent:
          type: number

    BudgetResponse:
      type: object
      properties:
        id:
          type: string
        organization_id:
          type: string
        category:
          type: string
        period_start:
          type: string
          format: date
        period_end:
          type: string
          format: date
        planned_amount:
          type: number
        alert_threshold_percent:
          type: number
        consumed_amount:
          type: number
        usage_percent:
          type: number
        threshold_reached:
          type: boolean

    BudgetListResponse:
      type: object
      properties:
        budgets:
          type: array
          items:
            $ref: '#/components/schemas/BudgetResponse'

    ExecutiveDashboardResponse:
      type: object
      properties:
        period_start:
          type: string
          format: date
        period_end:
          type: string
          format: date
        total_income:
          type: number
        total_expense:
          type: number
        total_payments:
          type: number
        outstanding_debt:
          type: number
        total_account_balance:
          type: number
        total_budget:
          type: number
        budget_usage_percent:
          type: number
        pending_expenses:
          type: integer
        active_debts:
          type: integer

    ReconciliationCreateRequest:
      type: object
      required: [account_id, period_start, period_end, statement_balance]
      properties:
        account_id:
          type: string
        period_start:
          type: string
          format: date
        period_end:
          type: string
          format: date
        statement_balance:
          type: number
        notes:
          type: string

    ReconciliationResolveRequest:
      type: object
      properties:
        notes:
          type: string

    ReconciliationResponse:
      type: object
      properties:
        id:
          type: string
        account_id:
          type: string
        period_start:
          type: string
          format: date
        period_end:
          type: string
          format: date
        book_balance:
          type: number
        statement_balance:
          type: number
        difference_amount:
          type: number
        status:
          type: string
        notes:
          type: string
        resolved_on:
          type: string
          nullable: true

    ReconciliationListResponse:
      type: object
      properties:
        reconciliations:
          type: array
          items:
            $ref: '#/components/schemas/ReconciliationResponse'

    AlertResponse:
      type: object
      properties:
        id:
          type: string
        module:
          type: string
        severity:
          type: string
        channel:
          type: string
        title:
          type: string
        message:
          type: string
        reference_type:
          type: string
          nullable: true
        reference_id:
          type: string
          nullable: true
        status:
          type: string
        triggered_on:
          type: string
          format: date-time
        read_on:
          type: string
          format: date-time
          nullable: true

    AlertListResponse:
      type: object
      properties:
        alerts:
          type: array
          items:
            $ref: '#/components/schemas/AlertResponse'

    EvaluateAlertsResponse:
      type: object
      properties:
        generated:
          type: integer

    AuditEventResponse:
      type: object
      properties:
        id:
          type: string
        organization_id:
          type: string
          nullable: true
        user_id:
          type: string
          nullable: true
        module:
          type: string
        action:
          type: string
        entity_type:
          type: string
          nullable: true
        entity_id:
          type: string
          nullable: true
        trace_id:
          type: string
          nullable: true
        details:
          type: object
        occurred_on:
          type: string
          format: date-time

    AuditEventListResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/AuditEventResponse'

    AttachmentUploadRequest:
      type: object
      required: [module, entity_id, file]
      properties:
        module:
          type: string
        entity_id:
          type: string
        file:
          type: string
          format: binary

    AttachmentResponse:
      type: object
      properties:
        id:
          type: string
        module:
          type: string
        entity_id:
          type: string
        file_name:
          type: string
        mime_type:
          type: string
        size_bytes:
          type: integer
        status:
          type: string

    AttachmentListResponse:
      type: object
      properties:
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/AttachmentResponse'

    SettingUpsertRequest:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
        value:
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: object
            - type: array
        value_type:
          type: string
        is_sensitive:
          type: boolean

    SettingResponse:
      type: object
      properties:
        key:
          type: string
        value:
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: object
            - type: array
            - type: 'null'
        value_type:
          type: string
        is_sensitive:
          type: boolean

    SettingListResponse:
      type: object
      properties:
        settings:
          type: array
          items:
            $ref: '#/components/schemas/SettingResponse'

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    PermissionListResponse:
      type: object
      required: [permissions]
      properties:
        permissions:
          type: array
          items:
            type: string

    AssignRoleRequest:
      type: object
      properties:
        role_names:
          type: array
          items:
            type: string

    AssignRoleResponse:
      type: object
      required: [user_id, roles]
      properties:
        user_id:
          type: string
        roles:
          type: array
          items:
            type: string

    ErrorDetail:
      type: object
      properties:
        field:
          type: string
        issue:
          type: string

    ErrorResponse:
      type: object
      required: [code, message, trace_id, timestamp]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
